- term: veterinary prescription
  definition: A prescription written or authorized by a licensed veterinary professional for a specific animal.
- term: refill authorization
  definition: Permission from the veterinary office for the pharmacy to provide more medication when no refill remains or review is needed.
- term: compounded medication
  definition: A medication prepared in a customized form, such as a flavored liquid or capsule, when directed by the prescriber.
- term: species-specific caution
  definition: A reminder that dogs, cats, and other animals may need different veterinary review even when a medication name looks familiar.
- term: adverse effect
  definition: An unwanted or concerning change after medication that should be discussed with the veterinarian.
- term: label direction
  definition: The written instruction on the bottle or package for the pet named on the prescription.
- term: prescriber
  definition: The licensed professional or veterinary office responsible for authorizing the prescription.
- term: pharmacy availability
  definition: Whether the pharmacy can access the prescribed form, strength, or preparation.
- term: maintenance medication
  definition: A medication used as part of an ongoing veterinarian-directed care plan.
- term: emergency veterinary care
  definition: Urgent veterinary service for severe, sudden, or dangerous signs that should not wait for routine follow-up.
